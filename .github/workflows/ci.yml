name: INT332 Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  maven-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven build and test
        run: mvn -B clean verify
        working-directory: labs/lab4-maven-project

  container-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Node.js container image
        run: docker build -t demo-node-app ./labs/lab2-custom-image

      - name: Verify container runs
        run: |
          docker run -d --name app-test -p 3001:3001 demo-node-app
          sleep 3
          curl -f http://localhost:3001
